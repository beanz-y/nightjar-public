# Nightjar release + transparency pipeline (P7/P8, DESIGN 10.1/10.3; DESIGN 10).
#
# Model A (the load-bearing choice, DESIGN 10): the artifact this workflow
# hashes, logs to Rekor, and DEPLOYS is one and the same, so "served bytes ==
# logged hash" holds by construction. Cloudflare's own git-integration auto-build
# MUST be turned OFF (this workflow is the only deploy path), otherwise Cloudflare
# would rebuild from source in its own unpinned builder and the served bytes could
# drift from the logged hash.
#
# Trigger: a push to main (or a manual dispatch). The version comes from the
# committed VERSION file, not from tags: the earlier design's SSH-signed-tag
# ceremony was dropped as operator friction (DESIGN 10.1 records this), and the
# transparency story rests on the digest-pinned container build + the keyless
# Rekor entry, whose OIDC identity names this repo, workflow, and commit.
#
# A `gate` job runs the full test suites and both typechecks first; production
# never receives a build whose KAT-locked crypto suite did not just pass.
#
# One-time setup by the operator (all dashboard/web actions, no local CLI):
#   - Make the repo PUBLIC (scrubbed, DESIGN 10) so public-good Rekor + the
#     rebuild-from-source story work.
#   - Turn OFF Cloudflare Pages/Workers git-integration auto-deploy.
#   - Add repo secrets: CLOUDFLARE_API_TOKEN (a scoped Workers-deploy token created
#     in the CF dashboard) and CLOUDFLARE_ACCOUNT_ID.
#   - Actions permissions already allow id-token: write below (Sigstore keyless).
#
# Supply chain (DESIGN 10): every `uses:` is pinned to a full commit SHA (the
# trailing comment is the tag it was resolved from). To bump one, resolve the
# new tag to its commit (e.g. `git ls-remote https://github.com/actions/checkout
# refs/tags/vX.Y.Z`) and update both the SHA and the comment.

name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Sigstore keyless OIDC -> Rekor

# Two rapid pushes must deploy IN ORDER: a stale build landing last would leave
# production mismatching the newest Rekor entry and the canary's attested hash.
concurrency:
  group: nightjar-release
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (LF via .gitattributes)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Node from .nvmrc
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck (app + configs)
        run: npm run typecheck

      - name: Typecheck (worker)
        run: npx tsc --noEmit -p worker/tsconfig.json

      - name: Unit + integration tests (node)
        run: npm test

      - name: Relay tests (workerd)
        run: npm run test:worker

  release:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (LF via .gitattributes)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Version comes from the committed VERSION file, NOT the branch/ref name, so a
      # push to main keeps a stable release version (bump VERSION to cut a new one).
      # A redeploy of unchanged source is then byte-identical, so the canary that
      # attests {version, releaseHash} stays valid without a re-sign.
      - name: Derive the release version (from VERSION)
        run: echo "NIGHTJAR_VERSION=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_ENV"

      - name: Build once inside the digest-pinned container (the canonical artifact)
        run: |
          docker build -f Dockerfile.build \
            --build-arg NIGHTJAR_VERSION="${NIGHTJAR_VERSION}" \
            -t nightjar-build .
          # Extract the exact built tree into ./dist (what gets hashed AND deployed).
          rm -rf dist && mkdir dist
          cid=$(docker create nightjar-build)
          docker cp "$cid:/app/dist/." dist/
          docker rm "$cid"

      - name: Compute the canonical release hash (DESIGN 10)
        id: hash
        run: |
          # NIGHTJAR_VERSION is already in the env from the derive step above.
          node scripts/release-hash.mjs dist
          echo "release_hash=$(sha256sum manifest.txt | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Sign the manifest into public-good Rekor (keyless)
        run: |
          # Keyless: the signer identity is THIS repo's workflow OIDC token,
          # recorded in the append-only Rekor log. The bundle self-verifies offline.
          cosign sign-blob --yes manifest.txt --bundle manifest.cosign.bundle

      # wrangler bundles the Worker (worker/index.ts) at deploy time, which pulls in
      # its imports (@noble, @scure via the shared src/), so the runner needs the
      # project deps at the SAME node version the project pins. The container
      # build's node_modules stays in the container; the runner has none until now.
      # (dist/ was copied out separately and is unaffected.)
      - name: Node from .nvmrc
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install deps for the Worker bundle
        run: npm ci

      - name: Deploy the exact hashed artifact (Model A)
        uses: cloudflare/wrangler-action@9681c2997648301493e78cacbfb790a9f19c833f # v3.9.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pin wrangler to the project's major version: wrangler-action's default
          # (3.90.0) predates wrangler.jsonc support and fails with "Missing
          # entry-point" because it never reads the `main` field.
          wranglerVersion: '4.35.0'
          # No build here: wrangler deploy uploads the already-built ./dist assets
          # + the Worker. keep_vars:true (wrangler.jsonc) preserves dashboard
          # vars/secrets (ADMIN_TOKEN, VAPID_JWK, CANARY_JSON).
          command: deploy

      # No tag on a main push, so publish the transparency artifacts to the run
      # instead of a GitHub Release. Rekor (append-only) is the real anchor; these
      # are conveniences an auditor can also regenerate from source. The commit and
      # the release hash are both in the artifact name, so correlating a run to a
      # Rekor entry needs no download.
      - name: Publish the manifest + cosign bundle as run artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nightjar-${{ env.NIGHTJAR_VERSION }}-${{ github.sha }}-${{ steps.hash.outputs.release_hash }}
          path: |
            manifest.txt
            release.json
            manifest.cosign.bundle
